openapi: 3.1.0

info:
  title: APX — APDS Parking eXtensions
  version: 0.1.0
  summary: An open companion standard to APDS 4.1
  description: |-
    **APX (APDS Parking eXtensions)** is an additive companion standard to the
    [APDS 4.1 API](https://github.com/parkingdata/spec) (Alliance for Parking
    Data Standards, published as ISO/TS 5206-1).

    APX follows an **APDS-first prime directive**: wherever APDS 4.1 already
    defines a route, schema, or convention, APX uses it verbatim (by `$ref`
    into the vendored, unmodified `apds-api-4.1.yaml`). APX only adds what
    APDS deliberately leaves out:

    - **Data profile** — Full/Change update semantics, tombstones, and a
      cursor-based change feed as additive parameters on APDS's native routes
    - **Delivery fabric** — a superset-compatible profile of APDS `/webhooks`
      (HMAC signing, normative retries, delivery ledger, SSE)
    - **Control** — command plane for gates/PARCS/devices with idempotency,
      lifecycle, and immutable audit
    - **Alerts** — operational alerting with open taxonomies via APDS
      UserDefinedCodeLists
    - **Discovery** — credential-scoped capability documents
    - **Accounts & payments, LPR, reservations, permits, tolling** — profiles
      and additive resources over APDS entities

    Extension identity follows the official APDS extension convention:
    `apds-ext:apx:<class>@<version>` (Use Case Document §C.2.5), with
    extensionName `apx`.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: APX Standard Working Group (stewarded by Umojo)
    email: rneubauer@umojo.com
  x-apds-extension:
    extensionName: apx
    extensionVersion: "1.0"
    apdsVersion: "4.1"

servers:
  - url: /apx/v1
    description: APX API root (APDS-native routes are served at their own verbatim paths)

tags:
  - name: Discovery
    description: Bootstrap and credential-scoped capability discovery.

paths:
  # ===== APDS 4.1 native routes, mounted VERBATIM from the vendored spec ===== #
  # The APX data profile (Part 5) adds additive query parameters (mode, cursor)
  # to the list operations; plain APDS clients are unaffected.
  /places:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1places"
  /places/{id}:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1places~1{id}"
  /observations:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1observations"
  /contacts:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1contacts"
  /contacts/{contactId}:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1contacts~1{contactId}"
  /rights/specs:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1rights~1specs"
  /rights/specs/{id}:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1rights~1specs~1{id}"
  /rates:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1rates"
  /rates/{id}:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1rates~1{id}"
  /sessions:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1sessions"
  /sessions/{id}:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1sessions~1{id}"
  /rights/assigned:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1rights~1assigned"
  /rights/assigned/{id}:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1rights~1assigned~1{id}"
  /quotes:
    $ref: "../vendor/apds/4.1/apds-api-4.1.yaml#/paths/~1quotes"

  # ===== APX routes ===== #
  /.well-known/apx-configuration:
    get:
      operationId: get-well-known-apx-configuration
      tags: [Discovery]
      summary: Bootstrap configuration document
      security: []
      description: |-
        Unauthenticated bootstrap document. Advertises the token endpoint,
        the APDS version this implementation extends, supported APX
        conformance classes, and code-list registry locations.

        Served at the server root (NOT under `/apx/v1`), per RFC 8615.
      responses:
        "200":
          description: Bootstrap configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApxConfiguration"

security:
  - apxOAuth: []

components:
  parameters:
    ModeParam:
      $ref: "./domains/data/schemas.yaml#/ModeParam"
    CursorParam:
      $ref: "./domains/data/schemas.yaml#/CursorParam"

  securitySchemes:
    apxOAuth:
      type: oauth2
      description: |-
        OAuth 2.0 client-credentials (aligned with APDS 4.1's `oAuth` scheme).
        APX scopes follow `apx.<domain>:<verb>`. Grants are carried in the
        normative token claims `apx_org` (Organisation reference) and
        `apx_places` (HierarchyElement UUID subtree grants; absent = all).
      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/oauth2/token
          scopes:
            apx.data:read: Read parking data via APDS-native routes
            apx.data:write: Create/update parking data via APDS-native routes
            apx.control:read: Read commands, lanes, and device status
            apx.control:execute: Execute commands (vend gate, lost ticket, push rate, apply validation…)
            apx.alerts:read: Read alerts
            apx.alerts:write: Raise, acknowledge, and resolve alerts
            apx.subscriptions:manage: Create and manage event subscriptions
            apx.accounts:read: Look up accounts and balances
            apx.payments:write: Take payments and post accounting write-backs
            apx.lpr:read: LPR plate/ticket cross-lookup
            apx.reservations:manage: Quote, book, amend, cancel reservations
            apx.permits:manage: Issue and manage permits
            apx.tolling:manage: Create and manage toll transactions

  schemas:
    RecordInfo:
      $ref: "./domains/common/schemas.yaml#/RecordInfo"
    Extensions:
      $ref: "./domains/common/schemas.yaml#/Extensions"
    ApxResourceCore:
      $ref: "./domains/common/schemas.yaml#/ApxResourceCore"
    Problem:
      $ref: "./domains/common/schemas.yaml#/Problem"
    EventEnvelope:
      $ref: "./domains/common/schemas.yaml#/EventEnvelope"
    CodeListValue:
      $ref: "./domains/common/schemas.yaml#/CodeListValue"
    ChangeFeedPage:
      $ref: "./domains/data/schemas.yaml#/ChangeFeedPage"

    ApxConfiguration:
      type: object
      description: Unauthenticated bootstrap configuration document.
      required:
        - apxVersion
        - apdsVersion
        - tokenEndpoint
        - conformanceClasses
      properties:
        apxVersion:
          type: string
          description: APX standard version implemented (semver).
          examples: ["0.1.0"]
        apdsVersion:
          type: string
          description: APDS version this implementation extends.
          examples: ["4.1"]
        tokenEndpoint:
          type: string
          format: uri
          description: OAuth2 token endpoint (client-credentials grant).
        conformanceClasses:
          type: array
          description: APX conformance classes this implementation supports.
          items:
            type: string
          examples:
            - ["apx-data", "apx-events", "apx-control", "apx-alerts", "apx-discovery"]
        registries:
          type: object
          description: Locations of the published UserDefinedCodeList registries.
          additionalProperties:
            type: string
            format: uri
